name: Extension Release

on:
  push:
    tags:
      - 'extension-v*'
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/validate-release-tag.mjs extension apps/extension/package.json extension-v

      - name: Check extension
        run: |
          pnpm lint
          pnpm format:check
          pnpm --filter @open-watch-party/shared test
          pnpm --filter @open-watch-party/extension check

      - name: Zip extensions
        run: |
          pnpm --filter @open-watch-party/extension exec wxt zip -b chrome
          pnpm --filter @open-watch-party/extension exec wxt zip -b firefox --sources
          pnpm --filter @open-watch-party/extension exec wxt zip -b safari
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Extension ${{ github.ref_name }}
          files: apps/extension/.output/*.zip

      - name: Submit to stores
        working-directory: apps/extension
        run: |
          pnpm exec wxt submit \
            --chrome-zip .output/*-chrome.zip \
            --firefox-zip .output/*-firefox.zip \
            --firefox-sources-zip .output/*-sources.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
